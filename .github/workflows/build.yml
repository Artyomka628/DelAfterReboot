name: Build MSI and Release (x86)

on:
  workflow_dispatch:
  push:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: true
        install: >
          mingw-w64-i686-gcc

    - name: Build del.exe
      shell: msys2 {0}
      run: |
        i686-w64-mingw32-gcc del.c -o del.exe -std=c99 -O2 -march=i686 -mtune=generic -D_WIN32_WINNT=0x0501 -DWINVER=0x0501 -static-libgcc -static-libstdc++ -fno-asynchronous-unwind-tables

    - name: Prepare build directory
      run: |
        mkdir build
        move del.exe build\del.exe

    - name: Read release info
      id: releaseinfo
      run: |
        $json = Get-Content release.json | ConvertFrom-Json
        Write-Host "VERSION=$($json.version)" >> $GITHUB_ENV
        Write-Host "NOTES=$($json.notes)" >> $GITHUB_ENV
        echo "::set-output name=version::$($json.version)"
        echo "::set-output name=notes::$($json.notes)"

    - name: List build directory
      run: dir build

    - name: Move del.exe to installer folder
      shell: pwsh
      run: |
        $exeSource = "$env:GITHUB_WORKSPACE\build\del.exe"
        $installerFolder = "$env:GITHUB_WORKSPACE\installer"
    
        if (-Not (Test-Path $exeSource)) {
            Write-Error "del.exe не найден: $exeSource"
            exit 1
        }

        Write-Host "Перемещаем del.exe в $installerFolder"
        Move-Item -Path $exeSource -Destination $installerFolder -Force

    - name: Build MSI
      shell: pwsh
      run: |
        Set-Location $env:GITHUB_WORKSPACE
        $delPath = Join-Path $env:GITHUB_WORKSPACE "installer\del.exe"
        candle installer\Product.wxs -ext WixUIExtension -loc installer\en-us.wxl -loc installer\ru-ru.wxl -dDelExePath="$env:GITHUB_WORKSPACE/build/del.exe" -out installer\
        light installer\Product.wixobj -ext WixUIExtension -o installer\DelAfterReboot.msi -b installer
      
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.releaseinfo.outputs.version }}
        name: v${{ steps.releaseinfo.outputs.version }}
        body: ${{ steps.releaseinfo.outputs.notes }}
        allowUpdates: true
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

    - name: Upload MSI to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: installer\DelAfterReboot.msi
        asset_name: DelAfterReboot.msi
        asset_content_type: application/x-msi
