name: Build MSI and Release (x86)

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Publish to GitHub Release?"
        required: true
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"
  push:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2 and install packages
      if: steps.msys2-cache.outputs.cache-hit != 'true'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: true
        install: >
          mingw-w64-i686-gcc
          mingw-w64-i686-binutils

    - name: Build del.exe
      shell: msys2 {0}
      run: |
        gcc del.c -o del.exe -std=c99 -O2 -march=i686 -mtune=generic -D_WIN32_WINNT=0x0600 -DWINVER=0x0600 -static-libgcc -static-libstdc++ -fno-asynchronous-unwind-tables

    - name: Embed manifest into exe
      shell: powershell
      run: |
        $mtPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\mt.exe"
        if (-not (Test-Path $mtPath)) { throw "mt.exe не найден!" }
        & $mtPath -manifest app.manifest -outputresource:del.exe;#1

    - name: Prepare build directory
      run: |
        mkdir build
        move del.exe build\del.exe

    - name: Read release info
      id: releaseinfo
      shell: pwsh
      run: |
        $json = Get-Content release.json | ConvertFrom-Json
        if (-not $json.version) { throw "version not found in release.json" }
        echo "VERSION=$($json.version)" >> $env:GITHUB_ENV
        echo "NOTES=$($json.notes)" >> $env:GITHUB_ENV

    - name: Debug version
      run: echo "VERSION=$env:VERSION"
      shell: pwsh

    - name: Move del.exe to installer folder
      shell: pwsh
      run: |
        $exeSource = "$env:GITHUB_WORKSPACE\build\del.exe"
        $installerFolder = "$env:GITHUB_WORKSPACE\installer"
        if (-not (Test-Path $exeSource)) {
          Write-Error "del.exe not found: $exeSource"
          exit 1
        }
        Move-Item -Path $exeSource -Destination $installerFolder -Force

    - name: Build MSI
      shell: pwsh
      run: |
        Set-Location $env:GITHUB_WORKSPACE
        candle installer\Product.wxs -ext WixUIExtension -dDelExePath="$env:GITHUB_WORKSPACE\installer\del.exe" -out installer\
        light installer\Product.wixobj -ext WixUIExtension -o installer\DelAfterReboot.msi -b installer

    - name: Ensure MSI exists
      shell: pwsh
      run: |
        $msi = "$env:GITHUB_WORKSPACE\installer\DelAfterReboot.msi"
        if (-not (Test-Path $msi)) {
          Write-Error "MSI not found: $msi"
          exit 1
        }

    - name: Create GitHub Release
      id: create_release
      if: >
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes') ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, 'Release'))
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: v${{ env.VERSION }}
        body: ${{ env.NOTES }}
        files: |
          installer/DelAfterReboot.msi
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      continue-on-error: true

    - name: Upload MSI as artifact
      if: >
        (github.event_name == 'push' && !contains(github.event.head_commit.message, 'Release')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'no') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes' && steps.create_release.outcome != 'success')
      uses: actions/upload-artifact@v4
      with:
        name: DelAfterReboot-msi
        path: installer/DelAfterReboot.msi

  notify:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Build notification message
        id: build_msg
        run: |
          WORKFLOW_NAME="${{ github.workflow }}"
          REPO="${{ github.repository }}"
          STATUS="${{ needs.build-release.result }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            MESSAGE=$'✅ Workflow *'"${WORKFLOW_NAME}"'* completed successfully.\nRepository: '"${REPO}"'\n[View Workflow]('"${URL}"')'
          else
            MESSAGE=$'❌ Workflow *'"${WORKFLOW_NAME}"'* finished with status: *'"${STATUS}"'*\nRepository: '"${REPO}"'\n[View Workflow]('"${URL}"')'
          fi

          printf '%s\n' "message<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$MESSAGE" >> "$GITHUB_OUTPUT"
          printf '%s\n' "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.build_msg.outputs.message }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT}" \
            --data-urlencode "text=${MESSAGE}" \
            -d parse_mode="Markdown"
