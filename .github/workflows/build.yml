name: Build MSI and Release (x86)

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Publish to GitHub Release?"
        required: true
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"
  push:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Restore MSYS2 cache
      id: msys2-cache
      uses: actions/cache@v3
      with:
        path: |
          C:\msys64\var\cache\pacman\pkg
          C:\msys64\mingw32
        key: msys2-${{ runner.os }}-gcc-${{ hashFiles('release.json', 'installer/**') }}

    - name: Setup MSYS2 and install packages
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: true
        install: >
          mingw-w64-i686-gcc

    - name: Save MSYS2 cache (only when cache missed)
      if: steps.msys2-cache.outputs.cache-hit != 'true'
      uses: actions/cache@v3
      with:
        path: |
          C:\msys64\var\cache\pacman\pkg
          C:\msys64\mingw32
        key: msys2-${{ runner.os }}-gcc-${{ hashFiles('release.json', 'installer/**') }}

    - name: Build del.exe
      shell: msys2 {0}
      run: |
        i686-w64-mingw32-gcc del.c -o del.exe -std=c99 -O2 -march=i686 -mtune=generic -D_WIN32_WINNT=0x0501 -DWINVER=0x0501 -static-libgcc -static-libstdc++ -fno-asynchronous-unwind-tables

    - name: Prepare build directory
      run: |
        mkdir build
        move del.exe build\del.exe

    - name: Read release info
      id: releaseinfo
      shell: pwsh
      run: |
        $json = Get-Content release.json | ConvertFrom-Json
        Write-Host "VERSION=$($json.version)" >> $env:GITHUB_ENV
        Write-Host "NOTES=$($json.notes)" >> $env:GITHUB_ENV

    - name: Move del.exe to installer folder
      shell: pwsh
      run: |
        $exeSource = "$env:GITHUB_WORKSPACE\build\del.exe"
        $installerFolder = "$env:GITHUB_WORKSPACE\installer"
        if (-not (Test-Path $exeSource)) {
          Write-Error "del.exe not found: $exeSource"
          exit 1
        }
        Move-Item -Path $exeSource -Destination $installerFolder -Force

    - name: Build MSI
      shell: pwsh
      run: |
        Set-Location $env:GITHUB_WORKSPACE
        candle installer\Product.wxs -ext WixUIExtension -dDelExePath="$env:GITHUB_WORKSPACE\installer\del.exe" -out installer\
        light installer\Product.wixobj -ext WixUIExtension -o installer\DelAfterReboot.msi -b installer

    # Branching logic:
    # - If triggered by workflow_dispatch and release == "yes": try create release + upload asset.
    #   If release creation/upload fails -> fallback to artifact upload.
    # - If workflow_dispatch and release == "no" OR push: upload artifact.
    - name: Ensure MSI exists
      shell: pwsh
      run: |
        $msi = "$env:GITHUB_WORKSPACE\installer\DelAfterReboot.msi"
        if (-not (Test-Path $msi)) {
          Write-Error "MSI not found: $msi"
          exit 1
        }

    - name: Create GitHub Release (dispatch + release=yes)
      id: create_release
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        name: v${{ env.VERSION }}
        body: ${{ env.NOTES }}
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      continue-on-error: true

    - name: Upload to GitHub Release (dispatch + release=yes)
      id: upload_release_asset
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes' && steps.create_release.outcome == 'success' }}
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: installer\DelAfterReboot.msi
        asset_name: DelAfterReboot.msi
        asset_content_type: application/x-msi
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      continue-on-error: true

    - name: Upload MSI as artifact (fallback or normal flow)
      if: |
        ${{ github.event_name == 'push' }} ||
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'no' }} ||
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes' && (steps.create_release.outcome != 'success' || steps.upload_release_asset.outcome != 'success') }}
      uses: actions/upload-artifact@v4
      with:
        name: DelAfterReboot-msi
        path: installer/DelAfterReboot.msi
